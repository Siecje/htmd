repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.10
    hooks:
      - id: ruff-check

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.19.1
    hooks:
      - id: mypy
        additional_dependencies: [
          Flask,
          pytest,
          types-Pygments,
          types-PyYAML, 
          types-requests,
          watchdog,
          Werkzeug,
        ]
        files: .
