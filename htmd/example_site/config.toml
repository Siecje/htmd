[site]
description = ""
# URL of a Facebook page
facebook = ""
# Unique Facebook ID used for platforminsights
# https://developers.facebook.com/docs/platforminsights
facebook_app_id = ""
logo = ""
name = "htmd"
# @twitter_username
twitter = "@"
url = ""

# Where to look for files
[folders]
build = "build"
pages = "pages"
posts = "posts"
static = "static"
templates = "templates"

[html]
# How to format HTML
# Only set one to True
# If pretty is true, minify will not be checked
pretty = false
minify = false

[posts]
all_posts_path = "/blog/"
extension = ".md"

[posts.author]
# Show author at the top of every post?
show = true
# Author to use if author is not specified in the post file
default_name = ""
# @twitter_username
default_twitter = ""
# facebook URL
default_facebook = ""

[posts.comments]
# https://cusdis.com/doc#/advanced/sdk
enabled = true
# If self-hosting change to your own domain
cusdis_host = "https://cusdis.com"
# Your unique Cusdis App ID
# Value can be found on Cusdis website under *Embeded Code*
cusdis_app_id = ""

[posts.discovery]
random_post_enabled = true

[posts.markdown]
extensions = [
    "codehilite",
    "fenced_code",
]
